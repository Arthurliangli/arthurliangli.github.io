name: Update dataset catalog

on:
  schedule:
    - cron: "17 9 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh dataset catalog checks
        run: node research-data-mapper/scripts/update-dataset-catalog.mjs

      - name: Commit catalog update
        run: |
          if git diff --quiet -- research-data-mapper/datasets.json; then
            echo "No catalog changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research-data-mapper/datasets.json
          git commit -m "Update dataset catalog checks"
          git push
